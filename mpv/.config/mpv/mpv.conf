##################
# video settings #
##################
# Removed profile=gpu-hq — settings below replace it explicitly
# Avoids redundant shader loads and double-application of scalers
video-sync=display-resample
hwdec=vulkan,auto-safe
hwdec-codecs=all
hwdec-extra-frames=6          # was 16 — reduced VRAM pressure
vo=gpu-next,gpu
gpu-context=waylandvk
gpu-api=vulkan

# Scaling
scale=ewa_lanczossharp        # keep for luma — this one matters visually
cscale=bilinear               # was ewa_lanczossharp — chroma, zero visible diff
dscale=mitchell

interpolation=no

# Debanding
deband=yes
deband-iterations=1
deband-threshold=35
deband-range=16
deband-grain=5

# Dithering
dither-depth=auto
temporal-dither=yes

# HDR tone-mapping
tone-mapping=hable
hdr-compute-peak=no           # was yes — expensive per-frame GPU readback
                              # set to yes only if tone-mapping looks washed out
hdr-peak-percentile=99.995

# Correct linear light scaling (replaces gpu-hq's sigmoid)
sigmoid-upscaling=yes
linear-downscaling=yes

# Window
autofit-larger=90%x90%
keepaspect=yes

##################
# audio settings #
##################
ao=pipewire,pulseaudio,alsa
audio-channels=auto-safe
af=volume
audio-buffer=0.040
volume-max=150
volume=100

##################
# cache settings #
##################
cache=yes
demuxer-max-bytes=800M
demuxer-max-back-bytes=200M
cache-secs=120
cache-pause=no
cache-pause-initial=no
stream-buffer-size=512k

##################
# performance settings #
##################
# Removed vd-lavc-threads=4 — let ffmpeg decide, hwdec ignores it anyway
hr-seek-framedrop=yes
hr-seek=yes
vd-lavc-dr=yes
blend-subtitles=video
video-latency-hacks=no

##################
# subtitle settings #
##################
slang=en,eng
sub-auto=fuzzy
sub-file-paths=subs:subtitles
sub-font='Noto Sans'
sub-font-size=48
sub-bold=yes
sub-color='#FFFFFFFF'
sub-border-color='#000000'
sub-border-size=3.0
sub-shadow-offset=1
sub-shadow-color='#33000000'
sub-spacing=0.5
sub-pos=95

##################
# audio language #
##################
alang=eng,en,jpn,ja

##################
# screenshot settings #
##################
screenshot-format=png
screenshot-png-compression=8
screenshot-directory=~/Pictures/mpv-screenshots
screenshot-template='%F-%P-%02n'
screenshot-tag-colorspace=yes
screenshot-high-bit-depth=yes

##################
# OSD settings #
##################
osd-level=1
osd-duration=2000
osd-font='Noto Sans'
osd-font-size=40
osd-color='#FFFFFF'
osd-border-color='#000000'
osd-border-size=2
osd-bar-align-y=0.9
osd-bar-w=60
osd-bar-h=2
osd-playing-msg='${filename}'

##################
# other settings #
##################
keep-open=yes
save-position-on-quit=yes
watch-later-directory=~/.config/mpv/watch_later
title='${media-title} - mpv'
loop-playlist=no
keep-open-pause=no
force-window=immediate
cursor-autohide=1000
msg-level=ffmpeg=error,ao/pipewire=warn,vulkan=warn

##################
# input settings #
##################
input-doubleclick-time=300
input-right-alt-gr=no

##################
# profiles #
##################
[igpu]
vulkan-device=AMD Radeon 680M (RADV REMBRANDT)
hwdec=vulkan,auto-safe

[dgpu]
vulkan-device=AMD Radeon RX 6700S (RADV NAVI23)
hwdec=vulkan,auto-safe
