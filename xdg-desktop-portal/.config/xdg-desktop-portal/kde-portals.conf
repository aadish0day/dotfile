# KDE Plasma portal configuration
# ~/.config/xdg-desktop-portal/kde-portals.conf
#
# This file is used when XDG_CURRENT_DESKTOP contains "KDE".
# All interfaces not listed explicitly fall back to `default=kde`.
#
# See: https://flatpak.github.io/xdg-desktop-portal/docs/portals.conf.html

[preferred]
default=kde

# Explicitly route every interface the KDE portal supports.
# This avoids the GTK portal intercepting anything on a mixed system.
org.freedesktop.impl.portal.Access=kde
org.freedesktop.impl.portal.Account=kde
org.freedesktop.impl.portal.AppChooser=kde
org.freedesktop.impl.portal.Background=kde
org.freedesktop.impl.portal.Clipboard=kde
org.freedesktop.impl.portal.DynamicLauncher=kde
org.freedesktop.impl.portal.Email=kde
org.freedesktop.impl.portal.FileChooser=kde
org.freedesktop.impl.portal.GlobalShortcuts=kde
org.freedesktop.impl.portal.Inhibit=kde
org.freedesktop.impl.portal.InputCapture=kde
org.freedesktop.impl.portal.Notification=kde
org.freedesktop.impl.portal.Print=kde
# ScreenCast + RemoteDesktop must be routed together (KDE couples them).
org.freedesktop.impl.portal.RemoteDesktop=kde
org.freedesktop.impl.portal.ScreenCast=kde
org.freedesktop.impl.portal.Screenshot=kde
org.freedesktop.impl.portal.Settings=kde
org.freedesktop.impl.portal.Usb=kde
org.freedesktop.impl.portal.Wallpaper=kde
# KWallet handles secrets.
org.freedesktop.impl.portal.Secret=kwallet
